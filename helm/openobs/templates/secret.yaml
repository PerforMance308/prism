{{- if not .Values.existingSecret }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace (include "openobs.fullname" .) -}}
{{- $existingJwt := "" -}}
{{- if and $existingSecret $existingSecret.data -}}
{{- $existingJwt = (index $existingSecret.data "JWT_SECRET" | b64dec) -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openobs.fullname" . }}
  labels:
    {{- include "openobs.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ default (randAlphaNum 48) (default $existingJwt .Values.secretEnv.JWT_SECRET) | quote }}
  {{- range $key, $value := .Values.secretEnv }}
  {{- if and (ne $key "JWT_SECRET") $value }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- end }}
